name: Deploy 1010 Glow to S3

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read

    env:
      S3_BUCKET: chadm-portfolio
      CF_DISTRIBUTION_ID: E3DGQMN9TWSU05

    steps:
      - name: Checkout code
        uses: actions/checkout@v6     # ← Updated to v6 (native Node 24)

      - name: Configure AWS Credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v6   # ← Updated to v6 (native Node 24)
        with:
          role-to-assume: arn:aws:iam::376374282414:role/GitHubActions-Exigency-Deploy
          aws-region: us-east-2

      - name: Deploy index.html to S3
        run: |
          aws s3 sync . s3://${{ env.S3_BUCKET }}/1010-glow/ \
            --delete \
            --cache-control "public, max-age=31536000, immutable"

      - name: Invalidate CloudFront
        run: |
          aws cloudfront create-invalidation \
            --distribution-id ${{ env.CF_DISTRIBUTION_ID }} \
            --paths "/1010-glow/*"

      - name: Success
        run: echo "✅ Deployed to https://chadmurchison.com/1010-glow/"