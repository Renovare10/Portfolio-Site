name: Deploy Main Portfolio to S3

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    env:
      S3_BUCKET: chadm-portfolio
      CF_DISTRIBUTION_ID: E3DGQMN9TWSU05

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Build Svelte app
        run: npm run build

      - name: Configure AWS Credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::376374282414:role/GitHubActions-Exigency-Deploy
          aws-region: us-east-2

      - name: Deploy to S3 (protects /projects/ folder)
        run: |
          aws s3 sync ./dist/ s3://${{ env.S3_BUCKET }}/ \
            --delete \
            --exclude "projects/*" \
            --cache-control "public, max-age=31536000, immutable"

      - name: Invalidate CloudFront
        run: |
          aws cloudfront create-invalidation \
            --distribution-id ${{ env.CF_DISTRIBUTION_ID }} \
            --paths "/*"

      - name: Success
        run: echo "✅ Deployed to https://chadmurchison.com/"