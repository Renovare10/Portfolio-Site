name: Deploy Portfolio to S3

on:
  push:
    branches: [ main ]
    paths:
      - 'index.html'          # Only deploy when the actual site changes
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    concurrency:
      group: deploy-portfolio
      cancel-in-progress: true

    env:
      S3_BUCKET: chadm-portfolio
      CF_DISTRIBUTION_ID: E3DGQMN9TWSU05

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS Credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::376374282414:role/GitHubActions-Exigency-Deploy
          aws-region: us-east-2

      - name: Deploy index.html to S3
        run: |
          aws s3 cp index.html s3://${{ env.S3_BUCKET }}/index.html \
            --cache-control "public, max-age=31536000, immutable" \
            --content-type "text/html; charset=utf-8"

      - name: Invalidate CloudFront cache
        run: |
          aws cloudfront create-invalidation \
            --distribution-id ${{ env.CF_DISTRIBUTION_ID }} \
            --paths "/index.html" "/"

      - name: Deployed
        run: echo "✅ Deployed https://chadmurchison.com/ (only index.html)"